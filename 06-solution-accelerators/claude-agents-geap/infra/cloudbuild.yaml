# Cloud Build config for cc-on-ge images.
#
# Parameterized: pass `_IMAGE` (image name) and `_TAG` (tag) per build.
# Submit by uploading the source dir of the image you want to build:
#
#   # Backend
#   gcloud builds submit backend/ \
#     --config infra/cloudbuild.yaml \
#     --substitutions=_IMAGE=cc-backend,_TAG=<tag> \
#     --project cpe-slarbi-nvd-ant-demos
#
#   # Bridge (Phase 5)
#   gcloud builds submit bridge/ \
#     --config infra/cloudbuild.yaml \
#     --substitutions=_IMAGE=cc-a2a-bridge,_TAG=<tag> \
#     --project cpe-slarbi-nvd-ant-demos
#
# By default this runs as the project's default Cloud Build service account
# (Google-managed). If that SA lacks artifactregistry.writer on the cc-on-ge
# repo, the push step fails with PERMISSION_DENIED — grant it then.
#
# TODO (pre-external-demo): switch the build to the cc-a2a-builder SA via
# `--service-account=projects/.../serviceAccounts/cc-a2a-builder@...`.

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cc-on-ge/${_IMAGE}:${_TAG}
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cc-on-ge/${_IMAGE}:latest
      - .

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/cc-on-ge/${_IMAGE}:${_TAG}
  - us-central1-docker.pkg.dev/$PROJECT_ID/cc-on-ge/${_IMAGE}:latest

substitutions:
  _IMAGE: cc-backend           # override per-build (cc-backend | cc-a2a-bridge | ...)
  _TAG: phase3-hello           # override per-build

options:
  # E2_HIGHCPU_32 (32 vCPU / 32 GiB). Phase 3 deps (google-adk + litellm)
  # exceed the resolver memory of smaller builders; even 16 GiB pods OOM'd
  # during inline-install probes. Bridge image is lighter but reuses the
  # same builder for consistency. See PROJECT_PLAN.md Lessons learned.
  machineType: E2_HIGHCPU_32
  # Cloud Build's legacy logs bucket is deprecated; send logs to Cloud Logging.
  logging: CLOUD_LOGGING_ONLY
